<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 720" role="img"
     aria-label="Isometric diagram of the agentic stack: orchestration frameworks (LangGraph, CrewAI, custom loops) on top, swarmstate as the state and checkpointing engine in the middle, Rust core and storage backends at the bottom.">
  <defs>
    <style>
      .lbl   { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 700; }
      .sub   { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 400; }
      .conn  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-style: italic; }
      .chip  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 600; }
    </style>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- ===================== Framework chips (above top layer) ===================== -->
  <g>
    <!-- connectors from chips down to the top face -->
    <path d="M176,68 L250,138" stroke="#3b4656" stroke-width="1.2" stroke-dasharray="3 3" fill="none"/>
    <path d="M340,56 L340,110" stroke="#3b4656" stroke-width="1.2" stroke-dasharray="3 3" fill="none"/>
    <path d="M495,68 L430,138" stroke="#3b4656" stroke-width="1.2" stroke-dasharray="3 3" fill="none"/>
    <circle cx="250" cy="138" r="2.2" fill="#3b4656"/>
    <circle cx="340" cy="110" r="2.2" fill="#3b4656"/>
    <circle cx="430" cy="138" r="2.2" fill="#3b4656"/>

    <rect x="124" y="36" width="104" height="32" rx="9" fill="#12171f" stroke="#2f3a4a"/>
    <text class="chip" x="176" y="57" text-anchor="middle" font-size="12.5" fill="#c9d3de">LangGraph</text>
    <rect x="296" y="24" width="88" height="32" rx="9" fill="#12171f" stroke="#2f3a4a"/>
    <text class="chip" x="340" y="45" text-anchor="middle" font-size="12.5" fill="#c9d3de">CrewAI</text>
    <rect x="436" y="36" width="118" height="32" rx="9" fill="#12171f" stroke="#2f3a4a"/>
    <text class="chip" x="495" y="57" text-anchor="middle" font-size="12.5" fill="#c9d3de">custom loops</text>
  </g>

  <!-- ground shadow -->
  <ellipse cx="340" cy="686" rx="190" ry="26" fill="#000000" opacity="0.30"/>

  <!-- ===================== Layer 3 · Rust core / storage ===================== -->
  <g>
    <polygon points="144,570 340,630 340,672 144,612" fill="#141922"/>
    <polygon points="340,630 536,570 536,612 340,672" fill="#0d1117"/>
    <polygon points="340,510 536,570 340,630 144,570" fill="#1c212b" stroke="#2f3a4a" stroke-width="0.75"/>
    <text class="lbl" x="340" y="566" text-anchor="middle" font-size="18" fill="#c9d3de">Rust core</text>
    <text class="sub" x="340" y="586" text-anchor="middle" font-size="12" fill="#8b97a5">msgpack · snapshots · storage backends</text>
  </g>

  <!-- connector: swarmstate <-> core -->
  <line x1="340" y1="476" x2="340" y2="506" stroke="#58a6ff" stroke-width="2"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="conn" x="352" y="495" font-size="11.5" fill="#8b97a5">fast serialization</text>

  <!-- ===================== Layer 2 · swarmstate (highlight) ===================== -->
  <g filter="url(#glow)">
    <polygon points="144,370 340,430 340,472 144,412" fill="#0f2a45"/>
    <polygon points="340,430 536,370 536,412 340,472" fill="#0a1d31"/>
    <polygon points="340,310 536,370 340,430 144,370" fill="#17395a" stroke="#58a6ff" stroke-width="2"/>
    <text class="lbl" x="340" y="366" text-anchor="middle" font-size="24" fill="#e6edf3">swarmstate</text>
    <text class="sub" x="340" y="388" text-anchor="middle" font-size="12.5" fill="#9fc9ff">state · checkpoints · deterministic routing</text>
  </g>

  <!-- connector: frameworks <-> swarmstate -->
  <line x1="340" y1="276" x2="340" y2="306" stroke="#58a6ff" stroke-width="2"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="conn" x="352" y="295" font-size="11.5" fill="#8b97a5">reads / writes state</text>

  <!-- ===================== Layer 1 · Orchestration frameworks ===================== -->
  <g>
    <polygon points="144,170 340,230 340,272 144,212" fill="#1a2130"/>
    <polygon points="340,230 536,170 536,212 340,272" fill="#10151e"/>
    <polygon points="340,110 536,170 340,230 144,170" fill="#273143" stroke="#2f3a4a" stroke-width="0.75"/>
    <text class="lbl" x="340" y="176" text-anchor="middle" font-size="17" fill="#c9d3de">Orchestration frameworks</text>
  </g>
</svg>
