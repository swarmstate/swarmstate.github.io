<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 600" role="img"
     aria-label="Isometric diagram of the agentic stack: orchestration frameworks on top, swarmstate as the state and checkpointing engine in the middle, Rust core and storage backends at the bottom.">
  <defs>
    <style>
      .lbl  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 700; }
      .sub  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 400; }
      .conn { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-style: italic; }
    </style>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="310" cy="556" rx="180" ry="24" fill="#000000" opacity="0.28"/>

  <!-- ===================== Layer 3 · Rust core / storage ===================== -->
  <g>
    <polygon points="120,470 310,528 310,554 120,496" fill="#141922"/>
    <polygon points="310,528 500,470 500,496 310,554" fill="#0e1218"/>
    <polygon points="310,412 500,470 310,528 120,470" fill="#1c212b" stroke="#2b3442" stroke-width="0.75"/>
    <text class="lbl" x="310" y="463" text-anchor="middle" font-size="19" fill="#c9d3de">Rust core</text>
    <text class="sub" x="310" y="484" text-anchor="middle" font-size="12" fill="#8b97a5">msgpack · snapshots · storage backends</text>
  </g>

  <!-- connector: swarmstate <-> core -->
  <line x1="310" y1="376" x2="310" y2="408" stroke="#58a6ff" stroke-width="2"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="conn" x="322" y="396" font-size="11.5" fill="#7d8896">fast serialization</text>

  <!-- ===================== Layer 2 · swarmstate (highlight) ===================== -->
  <g filter="url(#glow)">
    <polygon points="120,290 310,348 310,374 120,316" fill="#0f2a45"/>
    <polygon points="310,348 500,290 500,316 310,374" fill="#0a1f34"/>
    <polygon points="310,232 500,290 310,348 120,290" fill="#163a5c" stroke="#58a6ff" stroke-width="2"/>
    <text class="lbl" x="310" y="283" text-anchor="middle" font-size="24" fill="#e6edf3">swarmstate</text>
    <text class="sub" x="310" y="305" text-anchor="middle" font-size="12.5" fill="#9fc9ff">state · checkpoints · deterministic routing</text>
  </g>

  <!-- connector: frameworks <-> swarmstate -->
  <line x1="310" y1="196" x2="310" y2="228" stroke="#58a6ff" stroke-width="2"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="conn" x="322" y="216" font-size="11.5" fill="#7d8896">reads / writes state</text>

  <!-- ===================== Layer 1 · Orchestration frameworks ===================== -->
  <g>
    <polygon points="120,110 310,168 310,194 120,136" fill="#1a222f"/>
    <polygon points="310,168 500,110 500,136 310,194" fill="#131922"/>
    <polygon points="310,52 500,110 310,168 120,110" fill="#263042" stroke="#2b3442" stroke-width="0.75"/>
    <text class="lbl" x="310" y="104" text-anchor="middle" font-size="18" fill="#c9d3de">Orchestration frameworks</text>
    <text class="sub" x="310" y="125" text-anchor="middle" font-size="12" fill="#8b97a5">LangGraph · CrewAI · custom agent loops</text>
  </g>
</svg>
