<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 860" role="img"
     aria-label="Isometric architecture of the agentic stack. Top: orchestration frameworks (LangGraph, CrewAI, custom loops). Middle: swarmstate Python API with Store, HandoffGraph and SwarmStateSaver. Bottom: the Rust core (im::HashMap persistent store, msgpack codec, snapshot/diff engine, condition evaluator) over memory/redis/disk backends. Annotations show the drop-in integration API, the PyO3/GIL boundary, the stable msgpack format and abi3 wheels.">
  <defs>
    <style>
      .lbl  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 700; }
      .sub  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 400; }
      .conn { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-style: italic; }
      .chip { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 600; }
      .mono { font-family: "SF Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .an   { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- ===================== Framework chips (above top layer) ===================== -->
  <g>
    <path d="M200,78 L249,150" stroke="#3b4656" stroke-width="1.2" stroke-dasharray="3 3" fill="none"/>
    <path d="M360,64 L360,118" stroke="#3b4656" stroke-width="1.2" stroke-dasharray="3 3" fill="none"/>
    <path d="M520,78 L471,150" stroke="#3b4656" stroke-width="1.2" stroke-dasharray="3 3" fill="none"/>
    <circle cx="249" cy="150" r="2.4" fill="#3b4656"/>
    <circle cx="360" cy="118" r="2.4" fill="#3b4656"/>
    <circle cx="471" cy="150" r="2.4" fill="#3b4656"/>

    <rect x="148" y="49" width="104" height="30" rx="9" fill="#12171f" stroke="#2f3a4a"/>
    <text class="chip" x="200" y="69" text-anchor="middle" font-size="13" fill="#c9d3de">LangGraph</text>
    <rect x="316" y="35" width="88" height="30" rx="9" fill="#12171f" stroke="#2f3a4a"/>
    <text class="chip" x="360" y="55" text-anchor="middle" font-size="13" fill="#c9d3de">CrewAI</text>
    <rect x="460" y="49" width="120" height="30" rx="9" fill="#12171f" stroke="#2f3a4a"/>
    <text class="chip" x="520" y="69" text-anchor="middle" font-size="13" fill="#c9d3de">custom loops</text>
  </g>

  <!-- ground shadow -->
  <ellipse cx="360" cy="796" rx="210" ry="28" fill="#000000" opacity="0.30"/>

  <!-- ===================== Layer 3 · Rust core ===================== -->
  <g>
    <polygon points="110,660 360,732 360,780 110,708" fill="#141922"/>
    <polygon points="360,732 610,660 610,708 360,780" fill="#0d1117"/>
    <polygon points="360,588 610,660 360,732 110,660" fill="#1c212b" stroke="#2f3a4a" stroke-width="0.75"/>
    <text class="lbl" x="360" y="618" text-anchor="middle" font-size="19" fill="#c9d3de">Rust core</text>
    <!-- component badges -->
    <rect x="227" y="630" width="132" height="28" rx="7" fill="#12171f" stroke="#2f3a4a"/>
    <text class="chip" x="293" y="649" text-anchor="middle" font-size="12" fill="#c9d3de">persistent store</text>
    <rect x="373" y="630" width="120" height="28" rx="7" fill="#12171f" stroke="#2f3a4a"/>
    <text class="chip" x="433" y="649" text-anchor="middle" font-size="12" fill="#c9d3de">msgpack codec</text>
    <rect x="236" y="666" width="118" height="28" rx="7" fill="#12171f" stroke="#2f3a4a"/>
    <text class="chip" x="295" y="685" text-anchor="middle" font-size="12" fill="#c9d3de">snapshot / diff</text>
    <rect x="368" y="666" width="116" height="28" rx="7" fill="#12171f" stroke="#2f3a4a"/>
    <text class="chip" x="426" y="685" text-anchor="middle" font-size="12" fill="#c9d3de">condition eval</text>
  </g>

  <!-- connector: swarmstate <-> core -->
  <line x1="360" y1="549" x2="360" y2="584" stroke="#58a6ff" stroke-width="2"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="conn" x="372" y="571" font-size="12" fill="#8b97a5">fast serialization</text>

  <!-- ===================== Layer 2 · swarmstate (highlight) ===================== -->
  <g filter="url(#glow)">
    <polygon points="110,425 360,497 360,545 110,473" fill="#0f2a45"/>
    <polygon points="360,497 610,425 610,473 360,545" fill="#0a1d31"/>
    <polygon points="360,353 610,425 360,497 110,425" fill="#17395a" stroke="#58a6ff" stroke-width="2"/>
  </g>
  <text class="lbl" x="360" y="406" text-anchor="middle" font-size="26" fill="#e6edf3">swarmstate</text>
  <!-- component badges -->
  <rect x="176" y="414" width="66" height="28" rx="7" fill="#10273f" stroke="#356da3"/>
  <text class="chip" x="209" y="433" text-anchor="middle" font-size="12.5" fill="#cfe3ff">Store</text>
  <rect x="256" y="414" width="124" height="28" rx="7" fill="#10273f" stroke="#356da3"/>
  <text class="chip" x="318" y="433" text-anchor="middle" font-size="12.5" fill="#cfe3ff">HandoffGraph</text>
  <rect x="394" y="414" width="150" height="28" rx="7" fill="#10273f" stroke="#356da3"/>
  <text class="chip" x="469" y="433" text-anchor="middle" font-size="12.5" fill="#cfe3ff">SwarmStateSaver</text>
  <text class="sub" x="360" y="464" text-anchor="middle" font-size="12.5" fill="#9fc9ff">framework-agnostic Python API · fully typed</text>

  <!-- connector: frameworks <-> swarmstate -->
  <line x1="360" y1="314" x2="360" y2="349" stroke="#58a6ff" stroke-width="2"
        marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text class="conn" x="372" y="336" font-size="12" fill="#8b97a5">reads / writes state</text>

  <!-- ===================== Layer 1 · Orchestration frameworks ===================== -->
  <g>
    <polygon points="110,190 360,262 360,310 110,238" fill="#1a2130"/>
    <polygon points="360,262 610,190 610,238 360,310" fill="#10151e"/>
    <polygon points="360,118 610,190 360,262 110,190" fill="#273143" stroke="#2f3a4a" stroke-width="0.75"/>
    <text class="lbl" x="360" y="196" text-anchor="middle" font-size="18" fill="#c9d3de">Orchestration frameworks</text>
  </g>

  <!-- ===================== Right-side technical annotations ===================== -->
  <g>
    <!-- leaders -->
    <path d="M610,190 L662,178" stroke="#3b4656" stroke-width="1.1" stroke-dasharray="3 3" fill="none"/>
    <path d="M610,425 L662,372" stroke="#3b4656" stroke-width="1.1" stroke-dasharray="3 3" fill="none"/>
    <path d="M610,660 L662,648" stroke="#3b4656" stroke-width="1.1" stroke-dasharray="3 3" fill="none"/>

    <!-- frameworks note -->
    <text class="lbl" x="670" y="174" font-size="13.5" fill="#c9d3de">Your existing agent stack</text>
    <text class="an"  x="670" y="193" font-size="12" fill="#8b97a5">swap the checkpointer — one line</text>

    <!-- integration block -->
    <text class="lbl"  x="670" y="330" font-size="15" fill="#58a6ff">Drop-in integration</text>
    <text class="mono" x="670" y="352" font-size="12" fill="#c9d3de">SwarmStateSaver → BaseCheckpointSaver</text>
    <text class="mono" x="670" y="371" font-size="11.5" fill="#8b97a5">put · put_writes · get_tuple · list</text>
    <text class="mono" x="670" y="393" font-size="12" fill="#c9d3de">Store.set / get / snapshot / restore</text>
    <text class="mono" x="670" y="412" font-size="12" fill="#c9d3de">HandoffGraph.route(state)</text>
    <text class="an"   x="670" y="434" font-size="12" fill="#8b97a5">framework-agnostic · fully typed (py.typed)</text>

    <!-- rust core note -->
    <text class="lbl" x="670" y="604" font-size="13.5" fill="#c9d3de">Rust core · PyO3</text>
    <text class="an"  x="670" y="623" font-size="12" fill="#8b97a5">GIL released on hot paths</text>
    <text class="an"  x="670" y="642" font-size="12" fill="#8b97a5">O(1) persistent snapshots · incremental diffs</text>
    <text class="an"  x="670" y="661" font-size="12" fill="#8b97a5">stable msgpack format (cross-language)</text>
    <text class="an"  x="670" y="680" font-size="12" fill="#8b97a5">backends: memory · redis · disk</text>
    <text class="an"  x="670" y="699" font-size="12" fill="#8b97a5">cp39-abi3 wheels · Python 3.9+ · no compiler</text>
  </g>
</svg>
