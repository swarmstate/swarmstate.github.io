<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820" role="img"
     aria-label="Isometric layered architecture. Staggered slabs, each with a left-hand label. Top: Orchestration frameworks (LangGraph, CrewAI, custom loops). Then swarmstate (Store, HandoffGraph, SwarmStateSaver). Then the Rust core via PyO3 (persistent store, msgpack codec, snapshot/diff, condition evaluator). Bottom: storage — memory available, redis and disk planned.">
  <defs>
    <linearGradient id="gFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3c4a64"/><stop offset="1" stop-color="#2a384f"/>
    </linearGradient>
    <linearGradient id="gSwarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f74b8"/><stop offset="1" stop-color="#154070"/>
    </linearGradient>
    <linearGradient id="gCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#36435c"/><stop offset="1" stop-color="#232f43"/>
    </linearGradient>
    <linearGradient id="gStore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#313e58"/><stop offset="1" stop-color="#212c40"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .t   { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .b   { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 700; }
      .s   { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 600; }
    </style>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="715" cy="792" rx="250" ry="24" fill="#000" opacity="0.28"/>

  <!-- ================= L1 · Orchestration frameworks ================= -->
  <polygon points="300,150 520,260 520,274 300,164" fill="#222c3f"/>
  <polygon points="520,260 740,150 740,164 520,274" fill="#18202e"/>
  <polygon points="520,40 740,150 520,260 300,150" fill="url(#gFrame)" stroke="#46566f" stroke-width="1"/>
  <!-- icons -->
  <g class="s" font-size="12.5" fill="#dfe7f0" text-anchor="middle">
    <polygon points="406,122 430,134 430,156 406,144" fill="#2f3d58"/><polygon points="430,134 454,122 454,144 430,156" fill="#262f47"/><polygon points="430,110 454,122 430,134 406,122" fill="#46587b" stroke="#56688c" stroke-width="0.8"/>
    <text x="430" y="176">LangGraph</text>
    <polygon points="496,122 520,134 520,156 496,144" fill="#2f3d58"/><polygon points="520,134 544,122 544,144 520,156" fill="#262f47"/><polygon points="520,110 544,122 520,134 496,122" fill="#46587b" stroke="#56688c" stroke-width="0.8"/>
    <text x="520" y="176">CrewAI</text>
    <polygon points="586,122 610,134 610,156 586,144" fill="#2f3d58"/><polygon points="610,134 634,122 634,144 610,156" fill="#262f47"/><polygon points="610,110 634,122 610,134 586,122" fill="#46587b" stroke="#56688c" stroke-width="0.8"/>
    <text x="610" y="176">custom loops</text>
  </g>

  <!-- ================= L2 · swarmstate (highlight) ================= -->
  <polygon points="365,315 585,425 585,439 365,329" fill="#123a63"/>
  <polygon points="585,425 805,315 805,329 585,439" fill="#0c2a49"/>
  <g filter="url(#glow)">
    <polygon points="585,205 805,315 585,425 365,315" fill="url(#gSwarm)" stroke="#58a6ff" stroke-width="2"/>
  </g>
  <g class="s" font-size="12" fill="#eaf3ff" text-anchor="middle">
    <polygon points="451,287 475,299 475,321 451,309" fill="#17436e"/><polygon points="475,299 499,287 499,309 475,321" fill="#0f3157"/><polygon points="475,275 499,287 475,299 451,287" fill="#2f74b8" stroke="#7cc0ff" stroke-width="0.9"/>
    <text x="475" y="341">Store</text>
    <polygon points="561,287 585,299 585,321 561,309" fill="#17436e"/><polygon points="585,299 609,287 609,309 585,321" fill="#0f3157"/><polygon points="585,275 609,287 585,299 561,287" fill="#2f74b8" stroke="#7cc0ff" stroke-width="0.9"/>
    <text x="585" y="341">HandoffGraph</text>
    <polygon points="686,287 710,299 710,321 686,309" fill="#17436e"/><polygon points="710,299 734,287 734,309 710,321" fill="#0f3157"/><polygon points="710,275 734,287 710,299 686,287" fill="#2f74b8" stroke="#7cc0ff" stroke-width="0.9"/>
    <text x="710" y="341">SwarmStateSaver</text>
  </g>

  <!-- ================= L3 · Rust core ================= -->
  <polygon points="430,480 650,590 650,604 430,494" fill="#1e2739"/>
  <polygon points="650,590 870,480 870,494 650,604" fill="#151d2a"/>
  <polygon points="650,370 870,480 650,590 430,480" fill="url(#gCore)" stroke="#46566f" stroke-width="1"/>
  <g class="s" font-size="11" fill="#dfe7f0" text-anchor="middle">
    <polygon points="481,452 505,464 505,486 481,474" fill="#2f3d58"/><polygon points="505,464 529,452 529,474 505,486" fill="#262f47"/><polygon points="505,440 529,452 505,464 481,452" fill="#46587b" stroke="#56688c" stroke-width="0.8"/>
    <text x="505" y="504">persistent store</text>
    <polygon points="591,452 615,464 615,486 591,474" fill="#2f3d58"/><polygon points="615,464 639,452 639,474 615,486" fill="#262f47"/><polygon points="615,440 639,452 615,464 591,452" fill="#46587b" stroke="#56688c" stroke-width="0.8"/>
    <text x="615" y="504">msgpack codec</text>
    <polygon points="701,452 725,464 725,486 701,474" fill="#2f3d58"/><polygon points="725,464 749,452 749,474 725,486" fill="#262f47"/><polygon points="725,440 749,452 725,464 701,452" fill="#46587b" stroke="#56688c" stroke-width="0.8"/>
    <text x="725" y="504">snapshot / diff</text>
    <polygon points="811,452 835,464 835,486 811,474" fill="#2f3d58"/><polygon points="835,464 859,452 859,474 835,486" fill="#262f47"/><polygon points="835,440 859,452 835,464 811,452" fill="#46587b" stroke="#56688c" stroke-width="0.8"/>
    <text x="835" y="504">condition eval</text>
  </g>

  <!-- ================= L4 · Storage ================= -->
  <polygon points="495,645 715,755 715,769 495,659" fill="#1b2334"/>
  <polygon points="715,755 935,645 935,659 715,769" fill="#121926"/>
  <polygon points="715,535 935,645 715,755 495,645" fill="url(#gStore)" stroke="#46566f" stroke-width="1"/>
  <!-- cylinders -->
  <g class="s" font-size="12.5" text-anchor="middle">
    <path d="M583,632 V664 A32,12 0 0 0 647,664 V632" fill="#1c2634" stroke="#46566f" stroke-width="1"/>
    <ellipse cx="615" cy="632" rx="32" ry="12" fill="#26334a" stroke="#46566f" stroke-width="1"/>
    <text x="615" y="690" fill="#dfe7f0">memory</text>
    <path d="M683,632 V664 A32,12 0 0 0 747,664 V632" fill="#141b26" stroke="#33465e" stroke-width="1" stroke-dasharray="4 3"/>
    <ellipse cx="715" cy="632" rx="32" ry="12" fill="#1a2432" stroke="#33465e" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="715" y="690" fill="#7c869a">redis</text>
    <path d="M783,632 V664 A32,12 0 0 0 847,664 V632" fill="#141b26" stroke="#33465e" stroke-width="1" stroke-dasharray="4 3"/>
    <ellipse cx="815" cy="632" rx="32" ry="12" fill="#1a2432" stroke="#33465e" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="815" y="690" fill="#7c869a">disk</text>
    <text class="t" x="715" y="710" font-size="10.5" fill="#5b636d">redis · disk — planned</text>
  </g>

  <!-- ================= Left-hand pill labels ================= -->
  <g>
    <!-- leaders -->
    <path d="M250,150 L300,150" stroke="#3b4656" stroke-width="1.1" stroke-dasharray="3 3"/>
    <path d="M250,315 L365,315" stroke="#3b4656" stroke-width="1.1" stroke-dasharray="3 3"/>
    <path d="M250,480 L430,480" stroke="#3b4656" stroke-width="1.1" stroke-dasharray="3 3"/>
    <path d="M250,645 L495,645" stroke="#3b4656" stroke-width="1.1" stroke-dasharray="3 3"/>
    <circle cx="300" cy="150" r="3" fill="#4a5a70"/>
    <circle cx="365" cy="315" r="3.4" fill="#58a6ff"/>
    <circle cx="430" cy="480" r="3" fill="#4a5a70"/>
    <circle cx="495" cy="645" r="3" fill="#4a5a70"/>

    <rect x="36" y="129" width="214" height="42" rx="21" fill="#131a26" stroke="#3a4a60"/>
    <text class="b" x="143" y="156" text-anchor="middle" font-size="14" fill="#e6edf3">Orchestration</text>
    <text class="t" x="44" y="190" font-size="12" fill="#93a1b3">LangGraph · CrewAI · custom loops</text>

    <rect x="36" y="294" width="214" height="42" rx="21" fill="#122036" stroke="#58a6ff"/>
    <text class="b" x="143" y="321" text-anchor="middle" font-size="15" fill="#eaf3ff">swarmstate</text>
    <text class="t" x="44" y="355" font-size="12" fill="#93a1b3">state · checkpoints · routing (Python API)</text>

    <rect x="36" y="459" width="214" height="42" rx="21" fill="#131a26" stroke="#3a4a60"/>
    <text class="b" x="143" y="486" text-anchor="middle" font-size="14" fill="#e6edf3">Rust core · PyO3</text>
    <text class="t" x="44" y="520" font-size="12" fill="#93a1b3">GIL-free hot paths · abi3 wheels</text>

    <rect x="36" y="624" width="214" height="42" rx="21" fill="#131a26" stroke="#3a4a60"/>
    <text class="b" x="143" y="651" text-anchor="middle" font-size="14" fill="#e6edf3">Storage</text>
    <text class="t" x="44" y="685" font-size="12" fill="#93a1b3">memory · redis · disk · msgpack format</text>
  </g>
</svg>
