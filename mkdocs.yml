site_name: swarmstate
site_description: >-
  Drop-in state backend for LangGraph, CrewAI & custom agent loops -
  Rust core, framework-agnostic, built for production.
site_url: https://swarmstate.github.io/
repo_url: https://github.com/swarmstate/swarmstate
repo_name: swarmstate/swarmstate
edit_uri: ""
copyright: "© 2026 Jose L. Salmeron"

theme:
  name: material
  custom_dir: overrides
  # System fonts to match the landing's look-and-feel.
  font: false
  palette:
    scheme: slate
    primary: black
    accent: blue
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list        # enables { .md-button } on links/headings
  - md_in_html       # renders markdown inside <div markdown="1"> blocks
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables

nav:
  - Home: index.md
  - Why: why.md
  - Guide:
      - Overview: guide/index.md
      - Installation: installation.md
      - The Store: guide/store.md
      - Snapshots & diffs: guide/snapshots.md
      - Handoff graph: guide/handoff.md
      - LangGraph checkpointer: guide/langgraph.md
      - Redis backend: guide/redis.md
      - Disk backend: guide/disk.md
      - Postgres backend: guide/postgres.md
  - Tutorials:
      - Overview: tutorials/index.md
      - LangGraph - resumable agents: tutorials/langgraph.md
      - Custom multi-agent loop: tutorials/custom-loop.md
      - State portability: tutorials/portability.md
      - CrewAI - shared memory: tutorials/crewai.md
  - Benchmarks: benchmarks.md
  - Reference:
      - API: api.md
      - Architecture: architecture.md
      - Roadmap: roadmap.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/swarmstate/swarmstate
